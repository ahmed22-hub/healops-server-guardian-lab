global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "healops-incident-api"
    static_configs:
      - targets: ["127.0.0.1:5000"]

  - job_name: "node1-node-exporter"
    static_configs:
      - targets: ["192.168.56.11:9100"]

  - job_name: "node1-cadvisor"
    static_configs:
      - targets: ["192.168.56.11:8080"]

  - job_name: "node2-node-exporter"
    static_configs:
      - targets: ["192.168.56.12:9100"]

  - job_name: "node2-cadvisor"
    static_configs:
      - targets: ["192.168.56.12:8080"]

  - job_name: "node3-node-exporter"
    static_configs:
      - targets: ["192.168.56.13:9100"]

  - job_name: "node3-cadvisor"
    static_configs:
      - targets: ["192.168.56.13:8080"]
rule_files:
  - /etc/prometheus/rules/*.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093
